version: '3.8'

services:
  k6:
    image: grafana/k6:latest
    volumes:
      - ./:/tests
      - ./results:/tests/results
    environment:
      - BASE_URL=${BASE_URL:-http://host.docker.internal:8080}
      - API_TOKEN=${API_TOKEN:-test-token}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /tests
    profiles:
      - load-testing

  # Optional: InfluxDB for storing metrics
  influxdb:
    image: influxdb:1.8
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb
    profiles:
      - monitoring

  # Optional: Grafana for visualizing metrics
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - influxdb
    profiles:
      - monitoring

volumes:
  influxdb-data:
  grafana-data:

# Usage:
#
# Run smoke test:
#   docker compose -f tests/load/docker-compose.k6.yml run --rm k6 run scripts/smoke.js
#
# Run load test:
#   docker compose -f tests/load/docker-compose.k6.yml run --rm k6 run scripts/load.js
#
# Run stress test:
#   docker compose -f tests/load/docker-compose.k6.yml run --rm k6 run scripts/stress.js
#
# Run with InfluxDB output (requires monitoring profile):
#   docker compose -f tests/load/docker-compose.k6.yml --profile monitoring up -d influxdb grafana
#   docker compose -f tests/load/docker-compose.k6.yml run --rm k6 run --out influxdb=http://influxdb:8086/k6 scripts/load.js
#
# Custom base URL:
#   BASE_URL=http://my-server:8080 docker compose -f tests/load/docker-compose.k6.yml run --rm k6 run scripts/smoke.js

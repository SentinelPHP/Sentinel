services:
  app:
    build:
      context: ..
      dockerfile: .docker/Dockerfile.prod
    env_file:
      - ../.env
      - path: ../.env.local
        required: false
    restart: unless-stopped
    ports:
      - "${PROXY_LISTEN_PORT:-8080}:${PROXY_LISTEN_PORT:-8080}"
    environment:
      - APP_ENV=prod
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8
      - REDIS_URL=redis://redis:6379
      - MESSENGER_TRANSPORT_DSN=redis://redis:6379/messages
      - PROXY_LISTEN_PORT=${PROXY_LISTEN_PORT:-8080}
      - PROXY_TIMEOUT=${PROXY_TIMEOUT:-30.0}
      - PROXY_CONNECT_TIMEOUT=${PROXY_CONNECT_TIMEOUT:-10.0}
      - LOG_LEVEL=${LOG_LEVEL:-metadata_only}
      - SWOOLE_HOST=0.0.0.0
      - SWOOLE_WORKER_NUM=${SWOOLE_WORKER_NUM:-4}
      - SWOOLE_MAX_REQUEST=${SWOOLE_MAX_REQUEST:-10000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentinel
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: ..
      dockerfile: .docker/Dockerfile.prod
    command: ["php", "bin/console", "messenger:consume", "async", "--time-limit=3600", "--limit=1000", "--memory-limit=128M"]
    env_file:
      - ../.env
      - path: ../.env.local
        required: false
    restart: unless-stopped
    environment:
      - APP_ENV=prod
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8
      - REDIS_URL=redis://redis:6379
      - MESSENGER_TRANSPORT_DSN=redis://redis:6379/messages
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentinel
    deploy:
      replicas: ${WORKER_REPLICAS:-5}
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    read_only: true
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:

networks:
  sentinel:
    driver: bridge

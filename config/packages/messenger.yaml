framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
            failed:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    stream: failed_messages

        routing:
            'App\Message\RequestLogMessage': async
            'App\Message\SchemaValidateMessage': async
            'App\Message\SchemaLearnMessage': async
            'App\Message\AlertDispatchMessage': async
            'App\Message\GenerateDtoMessage': async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'

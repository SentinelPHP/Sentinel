name: Packages CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        package:
          - core
          - redact
          - encrypt
          - schema
          - drift
          - dto

    name: PHP ${{ matrix.php }} - ${{ matrix.package }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sodium, json
          coverage: xdebug

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.package }}-${{ hashFiles(format('packages/{0}/composer.json', matrix.package)) }}
          restore-keys: ${{ runner.os }}-composer-${{ matrix.package }}-

      - name: Install dependencies
        working-directory: packages/${{ matrix.package }}
        run: composer install --prefer-dist --no-progress

      - name: Run tests
        working-directory: packages/${{ matrix.package }}
        run: vendor/bin/phpunit --coverage-text

  static-analysis:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - core
          - redact
          - encrypt
          - schema
          - drift
          - dto

    name: PHPStan - ${{ matrix.package }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sodium, json

      - name: Install dependencies
        working-directory: packages/${{ matrix.package }}
        run: composer install --prefer-dist --no-progress

      - name: Run PHPStan
        working-directory: packages/${{ matrix.package }}
        run: vendor/bin/phpstan analyse src --level=10 || true

  code-style:
    runs-on: ubuntu-latest
    name: Code Style

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Check PHP syntax
        run: |
          find packages -name "*.php" -not -path "*/vendor/*" -print0 | xargs -0 -n1 php -l > /dev/null
